# Alembic configuration for FinPort
# Run: alembic upgrade head   (applies all migrations)
#      alembic revision --autogenerate -m "description"  (create new migration)

[alembic]
script_location = alembic
prepend_sys_path = ..
sqlalchemy.url = postgresql+psycopg2://finport:finport_dev_password@localhost:5432/finport

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
