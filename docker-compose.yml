version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finport
      POSTGRES_PASSWORD: finport_dev_password
      POSTGRES_DB: finport
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finport"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://finport:finport_dev_password@db:5432/finport
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
      - ./parsers:/app/parsers
      - ./reconciliation:/app/reconciliation
      - ./analytics:/app/analytics
      - uploaded_files:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        cd /app/backend &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ─── Celery worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://finport:finport_dev_password@db:5432/finport
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
      - ./parsers:/app/parsers
      - ./reconciliation:/app/reconciliation
      - ./analytics:/app/analytics
      - uploaded_files:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        cd /app/backend &&
        celery -A app.workers.celery_app worker
          --loglevel=info
          --queues=ingestion,reconciliation
          --concurrency=2
      "

  # ─── Flower (Celery monitoring) ────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    command: >
      sh -c "
        cd /app/backend &&
        celery -A app.workers.celery_app flower --port=5555
      "
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ─── React frontend (nginx in production) ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploaded_files:
